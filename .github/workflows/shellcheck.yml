name: shellcheck

on: [push, pull_request]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          # severity=error so intentional patterns (e.g. word-split pgrep loops)
          # don't fail CI; bump to "warning" once linted locally if you want stricter.
          severity: error
